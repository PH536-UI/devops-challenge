version: 0.0
os: linux

files:
  - source: webapp/target/webapp-1.0-SNAPSHOT.jar
    destination: /opt/webapp/

hooks:
  BeforeInstall:
    - location: scripts/stop_app.sh
      timeout: 30
      runas: root

  AfterInstall:
    - location: scripts/install_app.sh
      timeout: 60
      runas: root

  ApplicationStart:
    - location: scripts/start_app.sh
      timeout: 60
      runas: root

  ValidateService:
    - location: scripts/validate_app.sh
      timeout: 30
      runas: root
