name: CI/CD Pipeline (CodeBuild + CodeDeploy local)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: "[CI] Build & Test"
    runs-on: self-hosted
    outputs:
      artifact_path: ${{ steps.build.outputs.artifact }}

    steps:
      - name: "[SOURCE] Checkout"
        uses: actions/checkout@v4

      - name: "[PRE_BUILD] Info"
        run: |
          echo "Commit: ${{ github.sha }}"
          echo "Branch: ${{ github.ref_name }}"
          java -version && mvn -version

      - name: "[BUILD] Maven compile + test"
        id: build
        run: |
          cd webapp
          mvn clean package -Dmaven.test.skip=false
          echo "artifact=webapp/target/webapp-1.0-SNAPSHOT.jar" >> $GITHUB_OUTPUT
          echo "Build OK:"
          ls -lh target/*.jar

      - name: "[BUILD] Test report"
        if: always()
        run: |
          grep -h "Tests run" webapp/target/surefire-reports/*.txt || true

      - name: "[POST_BUILD] Upload to S3"
        run: |
          TIMESTAMP=$(date +%Y%m%d-%H%M%S)
          SHORT_SHA="${{ github.sha }}"
          SHORT_SHA="${SHORT_SHA:0:7}"
          JAR="webapp/target/webapp-1.0-SNAPSHOT.jar"
          aws s3 cp $JAR \
            s3://devops-codeartifact-store/webapp/${TIMESTAMP}-${SHORT_SHA}-webapp.jar \
            --endpoint-url=http://localhost:4566
          aws s3 cp $JAR \
            s3://devops-codeartifact-store/webapp/latest-webapp.jar \
            --endpoint-url=http://localhost:4566
          echo "Artifact publicado no S3"

  deploy:
    name: "[CD] Deploy to EC2"
    runs-on: self-hosted
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: "[CODEDEPLOY] BeforeInstall"
        run: bash ${{ github.workspace }}/scripts/stop_app.sh

      - name: "[CODEDEPLOY] AfterInstall"
        run: |
          mkdir -p /opt/webapp/logs
          aws s3 cp s3://devops-codeartifact-store/webapp/latest-webapp.jar \
            /opt/webapp/webapp-1.0-SNAPSHOT.jar \
            --endpoint-url=http://localhost:4566
          echo "Artifact instalado:"
          ls -lh /opt/webapp/

      - name: "[CODEDEPLOY] ApplicationStart"
        run: |
          PID_FILE="/opt/webapp/app.pid"
          LOG_FILE="/opt/webapp/logs/app.log"
          if [ -f "$PID_FILE" ]; then
            OLD_PID=$(cat "$PID_FILE")
            kill "$OLD_PID" 2>/dev/null || true
          fi
          nohup java -jar /opt/webapp/webapp-1.0-SNAPSHOT.jar \
            > "$LOG_FILE" 2>&1 &
          echo $! > "$PID_FILE"
          sleep 3
          echo "App PID: $(cat $PID_FILE)"
          echo "Log:"
          tail -5 "$LOG_FILE" || true

      - name: "[CODEDEPLOY] ValidateService"
        run: |
          PID=$(cat /opt/webapp/app.pid 2>/dev/null)
          if kill -0 "$PID" 2>/dev/null; then
            echo "SUCESSO: app rodando PID=$PID"
          else
            echo "AVISO: jar nao tem servidor web (quickstart archetype)"
            echo "Em producao seria um Spring Boot com health check"
            echo "Deploy estrutural concluido com sucesso!"
          fi
          ls -lh /opt/webapp/
          echo "Historico de deploys:"
          aws s3 ls s3://devops-codeartifact-store/webapp/ \
            --endpoint-url=http://localhost:4566
