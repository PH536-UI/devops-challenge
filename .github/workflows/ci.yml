name: CI/CD Pipeline (CodeBuild + CodeDeploy local)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: "[CI] Build & Test"
    runs-on: self-hosted
    steps:
      - name: "[SOURCE] Checkout"
        uses: actions/checkout@v4

      - name: "[PRE_BUILD] Info"
        run: |
          echo "Commit: ${{ github.sha }}"
          echo "Branch: ${{ github.ref_name }}"
          java -version && mvn -version

      - name: "[BUILD] Maven compile + test"
        run: |
          cd webapp
          mvn clean package
          echo "Artifact gerado:"
          ls -lh target/*.jar

      - name: "[BUILD] Test report"
        if: always()
        run: grep -h "Tests run" webapp/target/surefire-reports/*.txt || true

      - name: "[POST_BUILD] Upload to S3"
        run: |
          TIMESTAMP=$(date +%Y%m%d-%H%M%S)
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          JAR="webapp/target/webapp-1.0-SNAPSHOT.jar"
          aws s3 cp $JAR s3://devops-codeartifact-store/webapp/${TIMESTAMP}-${SHORT_SHA}-webapp.jar --endpoint-url=http://localhost:4566
          aws s3 cp $JAR s3://devops-codeartifact-store/webapp/latest-webapp.jar --endpoint-url=http://localhost:4566
          echo "Artifacts no S3:"
          aws s3 ls s3://devops-codeartifact-store/webapp/ --endpoint-url=http://localhost:4566

  deploy:
    name: "[CD] Deploy to EC2"
    runs-on: self-hosted
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: "[CODEDEPLOY] Checkout"
        uses: actions/checkout@v4

      - name: "[CODEDEPLOY] BeforeInstall - stop old app"
        run: bash scripts/stop_app.sh

      - name: "[CODEDEPLOY] AfterInstall - download from S3"
        run: |
          mkdir -p /opt/webapp/logs
          aws s3 cp s3://devops-codeartifact-store/webapp/latest-webapp.jar /opt/webapp/webapp-1.0-SNAPSHOT.jar --endpoint-url=http://localhost:4566
          echo "Artifact instalado:"
          ls -lh /opt/webapp/

      - name: "[CODEDEPLOY] ApplicationStart"
        run: |
          PID_FILE="/opt/webapp/app.pid"
          LOG_FILE="/opt/webapp/logs/app.log"
          if [ -f "$PID_FILE" ]; then
            kill $(cat "$PID_FILE") 2>/dev/null || true
          fi
          nohup java -jar /opt/webapp/webapp-1.0-SNAPSHOT.jar > "$LOG_FILE" 2>&1 &
          echo $! > "$PID_FILE"
          sleep 2
          echo "App PID: $(cat $PID_FILE)"

      - name: "[CODEDEPLOY] ValidateService"
        run: |
          PID=$(cat /opt/webapp/app.pid 2>/dev/null || echo "")
          if [ -n "$PID" ] && kill -0 "$PID" 2>/dev/null; then
            echo "SUCESSO: processo $PID rodando"
          else
            echo "AVISO: jar nao tem servidor web (archetype quickstart)"
            echo "Em producao seria Spring Boot com health check HTTP"
          fi
          echo "=== Artifacts no S3 ==="
          aws s3 ls s3://devops-codeartifact-store/webapp/ --endpoint-url=http://localhost:4566
          echo "=== Deploy concluido ==="
