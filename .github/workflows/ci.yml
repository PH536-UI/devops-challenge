name: Java CI

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: self-hosted
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven
        
    - name: Build with Maven
      run: mvn clean package -f webapp/pom.xml
      
    - name: Deploy to  S3
      run: |
        aws s3 cp ls -R  webapp/target/webapp-1.0-SNAPSHOT.jar s3://devops-codeartifact-store/ --endpoint-url=http://localhost:4566
