jobs:
  build:
    runs-on: self-hosted
    steps:
    - uses: actions/checkout@v3
    
    # REMOVA OU COMENTE ESTAS LINHAS:
    # - name: Set up JDK 17
    #   uses: actions/setup-java@v3
    #   with:
    #     java-version: '17'
    #     distribution: 'temurin'
    
    - name: Build with Maven
      run: mvn clean package -f webapp/pom.xml
      
    - name: Deploy to S3
      run: aws s3 cp webapp/target/webapp-1.0-SNAPSHOT.jar s3://devops-codeartifact-store/ --endpoint-url=http://localhost:4566
